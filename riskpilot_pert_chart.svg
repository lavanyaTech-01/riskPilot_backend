<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <!-- Define styles -->
  <defs>
    <style>
      .title { font-size: 20px; font-weight: bold; fill: #333; }
      .activity-box { fill: lightblue; stroke: darkblue; stroke-width: 2; }
      .activity-text { font-size: 11px; font-weight: bold; fill: darkblue; text-anchor: middle; }
      .arrow { stroke: blue; stroke-width: 2.5; fill: none; }
      .arrowhead { fill: blue; }
      .legend { font-size: 12px; fill: #333; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="white"/>

  <!-- Title -->
  <text x="800" y="40" text-anchor="middle" class="title">RiskPilot - PERT Chart (Critical Path Analysis)</text>

  <!-- Activity Boxes and Connections -->
  
  <!-- START -->
  <rect x="50" y="450" width="70" height="50" rx="5" class="activity-box"/>
  <text x="85" y="480" class="activity-text">START</text>

  <!-- 1. Req Gathering -->
  <line x1="120" y1="475" x2="170" y2="475" class="arrow"/>
  <polygon points="170,475 160,470 165,475 160,480" class="arrowhead"/>
  <rect x="170" y="450" width="70" height="50" rx="5" class="activity-box"/>
  <text x="205" y="475" class="activity-text">1. Req Gather</text>
  <text x="205" y="490" class="activity-text">(2.0w)</text>

  <!-- 2. SRS -->
  <line x1="240" y1="475" x2="290" y2="475" class="arrow"/>
  <polygon points="290,475 280,470 285,475 280,480" class="arrowhead"/>
  <rect x="290" y="450" width="70" height="50" rx="5" class="activity-box"/>
  <text x="325" y="475" class="activity-text">2. SRS &</text>
  <text x="325" y="490" class="activity-text">Arch (3.1w)</text>

  <!-- 4. Architecture -->
  <line x1="360" y1="475" x2="410" y2="475" class="arrow"/>
  <polygon points="410,475 400,470 405,475 400,480" class="arrowhead"/>
  <rect x="410" y="450" width="70" height="50" rx="5" class="activity-box"/>
  <text x="445" y="475" class="activity-text">4. Arch</text>
  <text x="445" y="490" class="activity-text">(5.1w)</text>

  <!-- 8. Backend Setup -->
  <line x1="480" y1="475" x2="530" y2="475" class="arrow"/>
  <polygon points="530,475 520,470 525,475 520,480" class="arrowhead"/>
  <rect x="530" y="450" width="70" height="50" rx="5" class="activity-box"/>
  <text x="565" y="475" class="activity-text">8. Setup</text>
  <text x="565" y="490" class="activity-text">(6.2w)</text>

  <!-- 10. URL Analysis -->
  <line x1="600" y1="475" x2="650" y2="475" class="arrow"/>
  <polygon points="650,475 640,470 645,475 640,480" class="arrowhead"/>
  <rect x="650" y="450" width="70" height="50" rx="5" class="activity-box"/>
  <text x="685" y="475" class="activity-text">10. URL</text>
  <text x="685" y="490" class="activity-text">(9.2w)</text>

  <!-- 16. Analysis UI -->
  <line x1="720" y1="475" x2="770" y2="475" class="arrow"/>
  <polygon points="770,475 760,470 765,475 760,480" class="arrowhead"/>
  <rect x="770" y="450" width="70" height="50" rx="5" class="activity-box"/>
  <text x="805" y="475" class="activity-text">16. UI</text>
  <text x="805" y="490" class="activity-text">(12.2w)</text>

  <!-- 19. Integration -->
  <line x1="840" y1="475" x2="890" y2="475" class="arrow"/>
  <polygon points="890,475 880,470 885,475 880,480" class="arrowhead"/>
  <rect x="890" y="450" width="70" height="50" rx="5" class="activity-box"/>
  <text x="925" y="475" class="activity-text">19. Integ</text>
  <text x="925" y="490" class="activity-text">(13.6w)</text>

  <!-- 20-21. External APIs & Deploy -->
  <line x1="960" y1="475" x2="1010" y2="475" class="arrow"/>
  <polygon points="1010,475 1000,470 1005,475 1000,480" class="arrowhead"/>
  <rect x="1010" y="450" width="80" height="50" rx="5" class="activity-box"/>
  <text x="1050" y="475" class="activity-text">20-21. APIs</text>
  <text x="1050" y="490" class="activity-text">(15.0w)</text>

  <!-- 22-25. Testing -->
  <line x1="1090" y1="475" x2="1140" y2="475" class="arrow"/>
  <polygon points="1140,475 1130,470 1135,475 1130,480" class="arrowhead"/>
  <rect x="1140" y="450" width="80" height="50" rx="5" class="activity-box"/>
  <text x="1180" y="475" class="activity-text">22-25. Test</text>
  <text x="1180" y="490" class="activity-text">(20.8w)</text>

  <!-- 26-28. Deployment -->
  <line x1="1220" y1="475" x2="1270" y2="475" class="arrow"/>
  <polygon points="1270,475 1260,470 1265,475 1260,480" class="arrowhead"/>
  <rect x="1270" y="450" width="80" height="50" rx="5" class="activity-box"/>
  <text x="1310" y="475" class="activity-text">26-28. Deploy</text>
  <text x="1310" y="490" class="activity-text">(23.6w)</text>

  <!-- END -->
  <line x1="1350" y1="475" x2="1400" y2="475" class="arrow"/>
  <polygon points="1400,475 1390,470 1395,475 1390,480" class="arrowhead"/>
  <rect x="1400" y="450" width="70" height="50" rx="5" class="activity-box"/>
  <text x="1435" y="475" class="activity-text">END</text>
  <text x="1435" y="490" class="activity-text">Complete</text>

  <!-- Non-Critical Paths (parallel activities) -->
  <g id="parallel-activities" opacity="0.6">
    <!-- Frontend components -->
    <line x1="565" y1="450" x2="565" y2="350" class="arrow" stroke="gray" stroke-dasharray="5,5"/>
    <rect x="530" y="280" width="70" height="50" rx="5" class="activity-box" fill="lightgray"/>
    <text x="565" y="305" class="activity-text" fill="gray">Auth Pages</text>
    <text x="565" y="320" class="activity-text" fill="gray">(1.4w slack)</text>
    
    <line x1="565" y1="280" x2="685" y2="475" class="arrow" stroke="gray" stroke-dasharray="5,5"/>
  </g>

  <!-- Legend and Info -->
  <g id="info-box">
    <rect x="50" y="650" width="1500" height="280" fill="lightyellow" stroke="#333" stroke-width="2" rx="5"/>
    
    <text x="800" y="680" text-anchor="middle" class="title" fill="darkblue">PERT Analysis - Key Metrics</text>
    
    <g id="left-column" x="60">
      <text x="60" y="710" class="legend" font-weight="bold">Critical Path Activities:</text>
      <text x="80" y="730" class="legend">1 (Req) > 2 (SRS) > 4 (Arch) > 8 (Setup)</text>
      <text x="80" y="750" class="legend">> 10 (URL) > 16 (UI) > 19 (Integ)</text>
      <text x="80" y="770" class="legend">> 20/21 (APIs) > 22-25 (Testing)</text>
      <text x="80" y="790" class="legend">> 26-28 (Deploy)</text>
      
      <text x="60" y="820" class="legend" font-weight="bold">Duration Estimates:</text>
      <text x="80" y="840" class="legend">Optimistic: 18 weeks | Most Likely: 25.6 weeks</text>
      <text x="80" y="860" class="legend">Pessimistic: 33.6 weeks</text>
    </g>

    <g id="right-column" x="800">
      <text x="800" y="710" class="legend" font-weight="bold">Confidence Intervals:</text>
      <text x="820" y="730" class="legend">68% confidence (+/- 1 std dev): 24.75 - 26.45 weeks</text>
      <text x="820" y="750" class="legend">95% confidence (+/- 2 std dev): 23.90 - 27.30 weeks</text>
      <text x="820" y="770" class="legend">99% confidence (+/- 3 std dev): 23.05 - 28.15 weeks</text>
      
      <text x="800" y="800" class="legend" font-weight="bold">Non-Critical Path:</text>
      <text x="820" y="820" class="legend">• Activities with slack/float can be delayed</text>
      <text x="820" y="840" class="legend">• Total available buffer: 6.9 weeks</text>
      <text x="820" y="860" class="legend">• Examples: Email (1.0w), File (1.0w) modules</text>
    </g>
  </g>
</svg>
