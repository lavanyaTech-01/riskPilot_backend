    <line x1="280" y1="180" x2="280" y2="1050" class="grid-line"/>
    <line x1="310" y1="180" x2="310" y2="1050" class="grid-line"/>
    <line x1="340" y1="180" x2="340" y2="1050" class="grid-line"/>
    <line x1="370" y1="180" x2="370" y2="1050" class="grid-line"/>
    <line x1="400" y1="180" x2="400" y2="1050" class="grid-line"/>
    <line x1="430" y1="180" x2="430" y2="1050" class="grid-line"/>
