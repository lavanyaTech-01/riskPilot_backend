    <text x="10" y="210" class="label">1. Req Gathering</text>
    <rect x="220" y="200" width="60" height="15" class="bar phase1"/>
    <text x="250" y="211" class="text-label" font-size="9">2w</text>

    <text x="10" y="240" class="label">2. SRS Document</text>
    <rect x="280" y="230" width="35" height="15" class="bar phase1"/>
    <text x="298" y="241" class="text-label" font-size="9">1.1w</text>

    <text x="10" y="270" class="label">3. Use Cases</text>
    <rect x="280" y="260" width="30" height="15" class="bar phase1"/>
    <text x="295" y="271" class="text-label" font-size="9">1w</text>
  </g>

  <!-- Phase 2 Activities (Weeks 4-8) -->
