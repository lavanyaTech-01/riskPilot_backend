    <rect x="430" y="590" width="30" height="15" class="bar phase3"/>
    <text x="445" y="601" class="text-label" font-size="9">1w</text>

    <text x="10" y="630" class="label">15. Auth Pages</text>
    <rect x="460" y="620" width="63" height="15" class="bar phase3"/>
    <text x="492" y="631" class="text-label" font-size="9">2.1w</text>

    <text x="10" y="660" class="label">16. Analysis UI</text>
    <rect x="640" y="650" width="90" height="15" class="bar phase3"/>
    <text x="685" y="661" class="text-label" font-size="9">3w</text>

    <text x="10" y="690" class="label">19. Integration</text>
    <rect x="760" y="680" width="42" height="15" class="bar phase3"/>
    <text x="781" y="691" class="text-label" font-size="9">1.4w</text>

    <text x="10" y="720" class="label">20. External APIs</text>
    <rect x="790" y="710" width="42" height="15" class="bar phase3"/>
    <text x="811" y="721" class="text-label" font-size="9">1.4w</text>
