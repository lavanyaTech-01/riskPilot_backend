    <text x="760" y="165" text-anchor="middle" class="label" font-size="10">W19</text>
    <text x="790" y="165" text-anchor="middle" class="label" font-size="10">W20</text>
    <text x="820" y="165" text-anchor="middle" class="label" font-size="10">W21</text>
