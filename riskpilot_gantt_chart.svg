<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <!-- Define styles -->
  <defs>
    <style>
      .phase1 { fill: #FF6B6B; }
      .phase2 { fill: #4ECDC4; }
      .phase3 { fill: #45B7D1; }
      .phase4 { fill: #FFA07A; }
      .phase5 { fill: #98D8C8; }
      .bar { stroke: #333; stroke-width: 1; }
      .title { font-size: 24px; font-weight: bold; fill: #333; }
      .label { font-size: 11px; fill: #333; }
      .text-label { font-size: 10px; fill: white; font-weight: bold; text-anchor: middle; }
      .grid-line { stroke: #ccc; stroke-width: 1; stroke-dasharray: 3,3; }
      .milestone { stroke: darkred; stroke-width: 2; stroke-dasharray: 5,5; }
      .legend { font-size: 12px; fill: #333; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1800" height="1200" fill="white"/>

  <!-- Title -->
  <text x="900" y="40" text-anchor="middle" class="title">RiskPilot - Gantt Chart (24-Week Project Timeline)</text>

  <!-- Legend -->
  <rect x="1150" y="60" width="200" height="120" fill="lightyellow" stroke="#333" stroke-width="2" rx="5"/>
  <text x="1160" y="80" class="legend">Project Phases:</text>
  <rect x="1165" y="90" width="15" height="15" class="phase1"/>
  <text x="1190" y="103" class="legend">Phase 1 - Requirements</text>
  
  <rect x="1165" y="115" width="15" height="15" class="phase2"/>
  <text x="1190" y="128" class="legend">Phase 2 - Design</text>
  
  <rect x="1165" y="140" width="15" height="15" class="phase3"/>
  <text x="1190" y="153" class="legend">Phase 3 - Development</text>
  
  <rect x="1165" y="165" width="15" height="15" class="phase4"/>
  <text x="1190" y="178" class="legend">Phase 4 - Testing</text>

  <!-- Timeline header -->
  <g id="timeline-header">
    <text x="150" y="170" class="label" font-weight="bold">Activities</text>
    <line x1="200" y1="180" x2="1400" y2="180" stroke="#333" stroke-width="2"/>
    
    <!-- Week markers -->
    <text x="220" y="165" text-anchor="middle" class="label" font-size="10">W1</text>
    <text x="250" y="165" text-anchor="middle" class="label" font-size="10">W2</text>
    <text x="280" y="165" text-anchor="middle" class="label" font-size="10">W3</text>
    <text x="310" y="165" text-anchor="middle" class="label" font-size="10">W4</text>
    <text x="340" y="165" text-anchor="middle" class="label" font-size="10">W5</text>
    <text x="370" y="165" text-anchor="middle" class="label" font-size="10">W6</text>
    <text x="400" y="165" text-anchor="middle" class="label" font-size="10">W7</text>
    <text x="430" y="165" text-anchor="middle" class="label" font-size="10">W8</text>
    <text x="460" y="165" text-anchor="middle" class="label" font-size="10">W9</text>
    <text x="490" y="165" text-anchor="middle" class="label" font-size="10">W10</text>
    <text x="520" y="165" text-anchor="middle" class="label" font-size="10">W11</text>
    <text x="550" y="165" text-anchor="middle" class="label" font-size="10">W12</text>
    <text x="580" y="165" text-anchor="middle" class="label" font-size="10">W13</text>
    <text x="610" y="165" text-anchor="middle" class="label" font-size="10">W14</text>
    <text x="640" y="165" text-anchor="middle" class="label" font-size="10">W15</text>
    <text x="670" y="165" text-anchor="middle" class="label" font-size="10">W16</text>
