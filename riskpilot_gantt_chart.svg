    <rect x="1050" y="300" width="300" height="180" fill="lightyellow" stroke="#333" stroke-width="2" rx="5"/>
    <text x="1200" y="325" text-anchor="middle" class="legend" font-weight="bold">PROJECT SUMMARY</text>
    <text x="1065" y="350" class="legend">Total Duration: 24 weeks</text>
    <text x="1065" y="375" class="legend">Critical Path: 25.6 weeks</text>
    <text x="1065" y="400" class="legend">Total Activities: 25</text>
    <text x="1065" y="425" class="legend">Team Size: 12 people</text>
    <text x="1065" y="450" class="legend">Effort: ~330 person-days</text>
  </g>
</svg>
