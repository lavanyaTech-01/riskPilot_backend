    <text x="10" y="750" class="label">22. Unit Testing</text>
    <rect x="820" y="740" width="60" height="15" class="bar phase4"/>
    <text x="850" y="751" class="text-label" font-size="9">2w</text>

    <text x="10" y="780" class="label">23. Integration Test</text>
    <rect x="850" y="770" width="42" height="15" class="bar phase4"/>
    <text x="871" y="781" class="text-label" font-size="9">1.4w</text>

    <text x="10" y="810" class="label">24. System Testing</text>
    <rect x="880" y="800" width="42" height="15" class="bar phase4"/>
    <text x="901" y="811" class="text-label" font-size="9">1.4w</text>

    <text x="10" y="840" class="label">25. UAT & Bugs</text>
    <rect x="910" y="830" width="42" height="15" class="bar phase4"/>
    <text x="931" y="841" class="text-label" font-size="9">1.4w</text>
  </g>

  <!-- Phase 5 Activities (Weeks 23-24) -->
  <g id="phase5-activities">
    <text x="10" y="870" class="label">26. Documentation</text>
    <rect x="880" y="860" width="42" height="15" class="bar phase5"/>
    <text x="901" y="871" class="text-label" font-size="9">1.4w</text>

    <text x="10" y="900" class="label">27. Deployment</text>
    <rect x="910" y="890" width="30" height="15" class="bar phase5"/>
    <text x="925" y="901" class="text-label" font-size="9">1w</text>

    <text x="10" y="930" class="label">28. Go-Live</text>
    <rect x="910" y="920" width="30" height="15" class="bar phase5"/>
    <text x="925" y="931" class="text-label" font-size="9">1w</text>
  </g>

  <!-- Milestones -->
  <g id="milestones">
    <line x1="280" y1="180" x2="280" y2="1050" class="milestone"/>
    <text x="280" y="1070" text-anchor="middle" class="label" font-weight="bold" fill="darkred">Week 3: Req Done</text>

    <line x1="400" y1="180" x2="400" y2="1050" class="milestone"/>
    <text x="400" y="1070" text-anchor="middle" class="label" font-weight="bold" fill="darkred">Week 8: Design Done</text>

    <line x1="460" y1="180" x2="460" y2="1050" class="milestone"/>
    <text x="460" y="1070" text-anchor="middle" class="label" font-weight="bold" fill="darkred">Week 9: Dev Start</text>

    <line x1="760" y1="180" x2="760" y2="1050" class="milestone"/>
    <text x="760" y="1070" text-anchor="middle" class="label" font-weight="bold" fill="darkred">Week 18: Dev Done</text>

    <line x1="820" y1="180" x2="820" y2="1050" class="milestone"/>
    <text x="820" y="1070" text-anchor="middle" class="label" font-weight="bold" fill="darkred">Week 19: Test Start</text>

    <line x1="910" y1="180" x2="910" y2="1050" class="milestone"/>
    <text x="910" y="1070" text-anchor="middle" class="label" font-weight="bold" fill="darkred">Week 24: GO-LIVE!</text>
