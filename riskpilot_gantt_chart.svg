    <line x1="490" y1="180" x2="490" y2="1050" class="grid-line"/>
    <line x1="520" y1="180" x2="520" y2="1050" class="grid-line"/>
    <line x1="550" y1="180" x2="550" y2="1050" class="grid-line"/>
    <line x1="580" y1="180" x2="580" y2="1050" class="grid-line"/>
    <line x1="610" y1="180" x2="610" y2="1050" class="grid-line"/>
    <line x1="640" y1="180" x2="640" y2="1050" class="grid-line"/>
    <line x1="670" y1="180" x2="670" y2="1050" class="grid-line"/>
    <line x1="700" y1="180" x2="700" y2="1050" class="grid-line"/>
    <line x1="730" y1="180" x2="730" y2="1050" class="grid-line"/>
    <line x1="760" y1="180" x2="760" y2="1050" class="grid-line"/>
    <line x1="790" y1="180" x2="790" y2="1050" class="grid-line"/>
    <line x1="820" y1="180" x2="820" y2="1050" class="grid-line"/>
